<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Finder — Polygon Search</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <!-- Leaflet Draw CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 300px;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
            border-right: 1px solid #ddd;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #ddd;
            background: #fff;
            font-weight: 600;
            font-size: 16px;
        }

        .polygons-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .polygon-item {
            padding: 12px;
            margin: 4px 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .polygon-item:hover {
            background: #f0f7ff;
            border-color: #0066cc;
        }

        .polygon-item.active {
            background: #e3f2fd;
            border-color: #0066cc;
        }

        .polygon-name-input {
            flex: 1;
            font-size: 14px;
            border: none;
            background: transparent;
            outline: none;
            cursor: text;
            padding: 0;
            min-width: 0;
        }

        .polygon-name-input:focus {
            border-bottom: 1px solid #0066cc;
        }

        .polygon-delete {
            background: #ff5252;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .polygon-delete:hover {
            background: #ff1744;
        }

        .run-button {
            margin: 8px;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .run-button:hover {
            background: #45a049;
        }

        .run-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .log-panel {
            padding: 12px;
            border-top: 1px solid #ddd;
            background: white;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            max-height: 200px;
            overflow-y: auto;
            border-radius: 4px;
            background: #f9f9f9;
        }

        .log-line {
            color: #333;
            line-height: 1.4;
        }

        .legend {
            padding: 12px;
            border-top: 1px solid #ddd;
            background: white;
            font-size: 12px;
            line-height: 1.6;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 4px 0;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            border: 1px solid #fff;
        }

        #map {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">Polygons</div>
            <div class="polygons-list" id="polygonsList"></div>
            <button class="run-button" id="runBtn" onclick="runSearch()">Run Search</button>
            <div class="log-panel" id="logPanel"></div>
            <div class="legend">
                <div style="font-weight: 600; margin-bottom: 8px;">Listing Scores</div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #2ecc71;"></div>
                    <span>Overall ≥ 4</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #f39c12;"></div>
                    <span>Overall ≥ 3</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #e74c3c;"></div>
                    <span>Overall < 3</span>
                </div>
            </div>
        </div>

        <!-- Map -->
        <div id="map"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <!-- Leaflet Draw JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <script>
        let map, drawnItems, polygons = [];

        // Initialize map
        map = L.map('map').setView([37.83, -122.27], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        // Draw control
        const drawControl = new L.Control.Draw({
            draw: {
                polygon: true,
                marker: false,
                polyline: false,
                rectangle: false,
                circle: false,
                circlemarker: false
            },
            edit: {
                featureGroup: drawnItems,
                remove: false
            }
        });
        map.addControl(drawControl);

        // Create a feature group for listings markers
        const listingsMarkers = new L.FeatureGroup();
        map.addLayer(listingsMarkers);

        // Load polygons and listings on startup
        loadPolygons();
        loadListings();

        // Save whenever a polygon is drawn, edited, or deleted
        map.on('draw:created', function(e) {
            const layer = e.layer;
            // Assign default name based on polygon count
            const count = drawnItems.getLayers().filter(l => l instanceof L.Polygon && !(l instanceof L.Rectangle)).length;
            layer.polygonName = `Polygon ${count + 1}`;
            drawnItems.addLayer(layer);
            log('Polygon drawn, saving...');
            savePolygonsFromMap();
        });

        map.on('draw:edited', function(e) {
            log('Polygon edited, saving...');
            savePolygonsFromMap();
        });

        map.on('draw:deletedall', function(e) {
            log('Polygons deleted, saving...');
            savePolygonsFromMap();
        });

        map.on('draw:deleted', function(e) {
            log('Polygon deleted, saving...');
            savePolygonsFromMap();
        });

        // Auto-save every 10 seconds if anything changed
        setInterval(function() {
            savePolygonsFromMap();
        }, 10000);

        // Load and render polygons
        function loadPolygons() {
            fetch('/polygons')
                .then(r => {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(data => {
                    // Normalize old format (plain arrays) to {name, coords} objects
                    const raw = data || [];
                    polygons = raw.map((item, idx) => {
                        if (Array.isArray(item)) {
                            return { name: `Polygon ${idx + 1}`, coords: item };
                        }
                        return item;
                    });

                    drawnItems.clearLayers();

                    // Render existing polygons on map
                    polygons.forEach((polygon, idx) => {
                        try {
                            const coords = polygon.coords || polygon;
                            const layer = L.polygon(
                                coords.map(([lon, lat]) => [lat, lon]),  // Leaflet uses [lat, lon]
                                { color: '#0066cc' }
                            );
                            layer.polygonIndex = idx;
                            layer.polygonName = polygon.name || `Polygon ${idx + 1}`;
                            drawnItems.addLayer(layer);
                        } catch (e) {
                            console.error('Error loading polygon ' + idx + ':', e);
                        }
                    });

                    renderPolygonsList();
                    log('✓ Loaded ' + polygons.length + ' polygon(s)');
                    console.log('Loaded polygons:', polygons);
                })
                .catch(err => {
                    log('✗ Error loading polygons: ' + err);
                    console.error('Load error:', err);
                });
        }

        // Load and render listings as markers
        function loadListings() {
            fetch('/listings')
                .then(r => {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(data => {
                    if (data.error) {
                        log('ℹ Listings not available: ' + data.error);
                        return;
                    }

                    // Clear existing markers
                    listingsMarkers.clearLayers();

                    data.forEach(listing => {
                        const score = parseFloat(listing.overall) || 0;
                        const color = score >= 4 ? '#2ecc71' : score >= 3 ? '#f39c12' : '#e74c3c';

                        const marker = L.circleMarker([listing.lat, listing.lng], {
                            radius: 8,
                            fillColor: color,
                            color: '#fff',
                            weight: 1.5,
                            opacity: 1,
                            fillOpacity: 0.85
                        });

                        const popupContent = `
                            <b>${listing.address}</b><br>
                            ${listing.price} &nbsp;|&nbsp; ${listing.type} &nbsp;|&nbsp; ${listing.beds}bd/${listing.baths}ba<br>
                            <br>
                            ⭐ Overall: <b>${listing.overall}</b><br>
                            🏚 Dungeon: ${listing.dungeon} &nbsp; 🌳 Backyard: ${listing.backyard}<br>
                            💡 Lighting: ${listing.lighting} &nbsp; 🏘 Hood: ${listing.neighborhood} &nbsp; 🔑 Turnkey: ${listing.turnkey}<br>
                            <br>
                            <i>${listing.reasoning}</i><br>
                            <br>
                            <a href="${listing.zillow}" target="_blank">View on Zillow →</a>
                        `;

                        marker.bindPopup(popupContent, { maxWidth: 300 });
                        marker.addTo(listingsMarkers);
                    });

                    log('✓ Loaded ' + data.length + ' listing(s) on map');
                    console.log('Loaded listings:', data);
                })
                .catch(err => {
                    log('ℹ Could not load listings: ' + err);
                    console.error('Load listings error:', err);
                });
        }

        // Save polygons from drawn items
        function savePolygonsFromMap() {
            const newPolygons = [];
            drawnItems.eachLayer(function(layer) {
                if (layer instanceof L.Polygon && !(layer instanceof L.Rectangle)) {
                    // Convert from Leaflet [lat, lon] to GeoJSON [lon, lat]
                    const coords = layer.getLatLngs()[0].map(ll => [ll.lng, ll.lat]);
                    const name = layer.polygonName || `Polygon ${newPolygons.length + 1}`;
                    newPolygons.push({ name, coords });
                }
            });

            // Only save if coords changed (not names)
            const newCoordsJson = JSON.stringify(newPolygons.map(p => p.coords));
            const oldCoordsJson = JSON.stringify(polygons.map(p => p.coords || p));
            if (newCoordsJson === oldCoordsJson) {
                return;  // No coord changes, skip
            }

            polygons = newPolygons;

            fetch('/polygons', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(polygons)
            })
            .then(r => {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(data => {
                renderPolygonsList();
                log('✓ Saved ' + polygons.length + ' polygon(s)');
                console.log('Polygons saved:', polygons);
            })
            .catch(err => {
                log('✗ Error saving: ' + err);
                console.error('Save error:', err);
            });
        }

        // Render list of polygons
        function renderPolygonsList() {
            const list = document.getElementById('polygonsList');
            list.innerHTML = polygons.map((poly, idx) => `
                <div class="polygon-item">
                    <input class="polygon-name-input"
                           value="${(poly.name || '').replace(/"/g, '&quot;')}"
                           onchange="renamePolygon(${idx}, this.value)"
                           onclick="event.stopPropagation()"
                    />
                    <button class="polygon-delete" onclick="deletePolygon(${idx}, event)">Delete</button>
                </div>
            `).join('');
        }

        // Rename a polygon
        function renamePolygon(idx, newName) {
            newName = (newName || '').trim();
            if (!newName) return;

            polygons[idx].name = newName;

            // Update the layer's name too
            let layerIdx = 0;
            drawnItems.eachLayer(layer => {
                if (layer instanceof L.Polygon && !(layer instanceof L.Rectangle)) {
                    if (layerIdx === idx) {
                        layer.polygonName = newName;
                    }
                    layerIdx++;
                }
            });

            savePolygonsToServer();
        }

        // Delete a polygon
        function deletePolygon(idx, event) {
            event.stopPropagation();
            polygons.splice(idx, 1);
            savePolygonsToServer();
        }

        // Highlight polygon on map
        function highlightPolygon(idx) {
            // Stub: could highlight the layer on hover
        }

        // Save polygons to server
        function savePolygonsToServer() {
            fetch('/polygons', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(polygons)
            })
            .then(r => r.json())
            .then(data => {
                loadPolygons();
                log('Polygons updated');
            })
            .catch(err => log('Error: ' + err));
        }

        // Run search
        function runSearch() {
            if (polygons.length === 0) {
                alert('Draw at least one polygon first');
                return;
            }

            const runBtn = document.getElementById('runBtn');
            runBtn.disabled = true;
            clearLog();
            log('Starting search...');

            const eventSource = new EventSource('/run');

            eventSource.onmessage = function(event) {
                if (event.data === '[done]') {
                    eventSource.close();
                    runBtn.disabled = false;
                    log('Search complete');
                } else {
                    log(event.data);
                }
            };

            eventSource.onerror = function(err) {
                eventSource.close();
                runBtn.disabled = false;
                log('Error: connection closed');
            };
        }

        // Logging
        function log(msg) {
            const panel = document.getElementById('logPanel');
            const line = document.createElement('div');
            line.className = 'log-line';
            line.textContent = msg;
            panel.appendChild(line);
            panel.scrollTop = panel.scrollHeight;
        }

        function clearLog() {
            document.getElementById('logPanel').innerHTML = '';
        }
    </script>
</body>
</html>
